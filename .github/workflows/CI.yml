name: CI

on: 
  push:
  pull_request:
  schedule:
    - cron: '0 9 15 * *'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Check cache
        run: |
          echo upstream_heads=`git ls-remote https://github.com/roothide/theos | head -n 1 | cut -f 1`-`git ls-remote https://github.com/theos/sdks | head -n 1 | cut -f 1` >> $GITHUB_ENV

      - name: Use cache
        id: cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/theos
          key: ${{ runner.os }}-${{ env.upstream_heads }}

      - name: Prepare Theos
        uses: ./
        with:
          theos-dir: ${{ github.workspace }}/theos
          theos-src: 'https://github.com/roothide/theos'
          theos-sdks: 'https://github.com/theos/sdks'

      - name: Verify Theos
        run: |
          echo "Theos installed at $THEOS"
          ls -la $THEOS
          [ -d "$THEOS/sdks" ] && echo "SDKs present" || true
          [ -d "$THEOS/toolchain" ] && echo "Toolchain present (Linux)" || true
