name: CI

on: 
  push:
  pull_request:
  schedule:
    - cron: '0 9 15 * *'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Check cache
        run: |
          echo upstream_heads=`git ls-remote https://github.com/roothide/theos | head -n 1 | cut -f 1`-`git ls-remote https://github.com/theos/sdks | head -n 1 | cut -f 1` >> $GITHUB_ENV

      - name: Use cache
        id: cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/theos
          key: ${{ runner.os }}-${{ env.upstream_heads }}

      - name: Prepare Theos
        uses: Randomblock1/theos-action@main
        with:
          theos-dir: ${{ github.workspace }}/theos
          theos-src: 'https://github.com/roothide/theos'
          theos-sdks: 'https://github.com/theos/sdks'

      - name: Setup GNU Make (macOS)
        if: runner.os == 'macOS'
        run: echo "$(brew --prefix)/opt/make/libexec/gnubin" >> $GITHUB_PATH

      - name: Build package
        run: |
          rm -f packages/*
          make package FINALPACKAGE=1 -j$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 4)
          make package THEOS_PACKAGE_SCHEME=rootless FINALPACKAGE=1 -j$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 4)
          make package THEOS_PACKAGE_SCHEME=roothide FINALPACKAGE=1 -j$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 4)

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: WCLitePro-${{ matrix.os }}
          path: ${{ github.workspace }}/packages/*.deb
